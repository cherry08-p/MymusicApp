<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaintcherryMB All-in-One Player</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Pyidaungsu&family=Noto+Sans+Myanmar:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #1db954;
            --bg-dark: #121212;
            --item-bg: #282828;
            --item-hover: #3e3e3e;
            --text-main: #ffffff;
        }

        body { 
            font-family: 'Pyidaungsu', sans-serif; 
            color: var(--text-main); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            margin: 0;
            background-color: var(--bg-dark);
        }

        .marquee {
            width: 100%; max-width: 500px; overflow: hidden; white-space: nowrap;
            margin-bottom: 20px; background: rgba(255,255,255,0.05); border-radius: 50px;
        }
        .marquee h2 {
            display: inline-block; padding-left: 100%; animation: marquee 25s linear infinite;
            color: var(--primary-color); font-size: 0.9rem; margin: 5px 0;
        }
        @keyframes marquee { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }

        .player-container { 
            width: 95%; max-width: 500px; background: #181818; padding: 20px; 
            border-radius: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); 
            text-align: center; position: sticky; top: 10px; z-index: 100;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        #current-song { color: var(--primary-color); font-weight: bold; margin-bottom: 15px; min-height: 2.5em; display: flex; align-items: center; justify-content: center; }
        audio { width: 100%; filter: invert(90%); }

        .search-container { width: 95%; max-width: 500px; margin-top: 20px; display: flex; gap: 10px; }
        #search-input {
            flex: 1; padding: 12px; border-radius: 12px; border: none;
            background: var(--item-bg); color: white; outline: none; font-size: 16px;
        }

        /* Offline File Upload Button */
        .file-label {
            background: var(--primary-color); color: black; padding: 10px; 
            border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 14px;
            display: flex; align-items: center; justify-content: center;
        }
        #file-upload { display: none; }

        .controls { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-top: 15px; }
        .btn {
            background: #333; border: none; color: white; padding: 10px;
            border-radius: 8px; cursor: pointer; font-size: 12px; transition: 0.3s;
        }
        .active-mode { background: var(--primary-color) !important; color: black !important; }

        #playlist { list-style: none; padding: 0; margin-top: 20px; width: 95%; max-width: 500px; }
        .song-item { 
            background: var(--item-bg); margin-bottom: 10px; padding: 12px 15px; 
            border-radius: 12px; display: flex; justify-content: space-between; align-items: center;
        }
        .song-item.active { border-left: 5px solid var(--primary-color); background: #333; }
        .song-info { cursor: pointer; flex: 1; text-align: left; padding-right: 10px; }
        .tag-offline { font-size: 9px; background: #555; padding: 2px 5px; border-radius: 4px; margin-right: 5px; vertical-align: middle; }

        .action-btns { display: flex; gap: 5px; }
        .dl-btn { background: #444; color: #1db954; border: none; padding: 6px 10px; border-radius: 5px; cursor: pointer; text-decoration: none; font-size: 12px; }
        
        .loader { border: 4px solid #333; border-top: 4px solid var(--primary-color); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="marquee">
        <h2>🎵 အိမ့်ချယ်ရီမိုဘိုင်းလ် - ကုန်သည်လမ်း၊ လပွတ္တာမြို့။ ဖုန်း-09790199067 🎵</h2>
    </div>

    <div class="player-container">
        <div id="current-song">သီချင်းရွေးချယ်ပါ</div>
        <audio id="audio-player" controls></audio>
        
        <div class="controls">
            <button class="btn" onclick="prevSong()">⏮ Prev</button>
            <button class="btn" id="shuffle-btn" onclick="toggleShuffle()">🔀 Shuffle Off</button>
            <button class="btn" id="repeat-btn" onclick="toggleRepeat()">🔁 Repeat Off</button>
            <button class="btn" onclick="nextSong()">Next ⏭</button>
        </div>
    </div>

    <div class="search-container">
        <input type="text" id="search-input" placeholder="သီချင်းရှာပါ..." onkeyup="filterSongs()">
        <label for="file-upload" class="file-label" title="ဖုန်းထဲမှ သီချင်းဖွင့်ရန်">
            📁 Local
        </label>
        <input type="file" id="file-upload" accept="audio/*" multiple onchange="handleOfflineFiles(event)">
    </div>

    <ul id="playlist">
        <div class="loader" id="loader"></div>
    </ul>

    <script>
        const sources = [
            { username: "EaintcherryMB", repo: "music-gitapp" },
            { username: "EaintcherryMB", repo: "Songs" },
            { username: "cherry08-p", repo: "MymusicApp" },
            { username: "cherry08-p", repo: "ecy1" }
        ];

        let allSongs = [];
        let filteredSongs = [];
        let currentIndex = -1;
        let isShuffle = false;
        let repeatMode = 'off';

        const audioPlayer = document.getElementById('audio-player');
        const currentSongTitle = document.getElementById('current-song');

        async function fetchSongs() {
            try {
                const fetchPromises = sources.map(src => 
                    fetch(`https://api.github.com/repos/${src.username}/${src.repo}/contents/`)
                    .then(res => res.json()).catch(() => [])
                );
                const results = await Promise.all(fetchPromises);
                allSongs = results.flat()
                    .filter(file => file.name && file.name.toLowerCase().endsWith('.mp3'))
                    .map(file => ({
                        name: file.name.replace('.mp3', '').replace(/[-_]/g, ' '),
                        url: file.download_url,
                        isOffline: false
                    }));
                
                updateDisplay();
            } catch (e) { console.error(e); }
        }

        // Offline Files (ဖုန်း/Computer ထဲမှဖိုင်များ) ကို ကိုင်တွယ်ခြင်း
        function handleOfflineFiles(event) {
            const files = event.target.files;
            for (let file of files) {
                const objectURL = URL.createObjectURL(file);
                allSongs.unshift({
                    name: file.name.replace('.mp3', '').replace(/[-_]/g, ' '),
                    url: objectURL,
                    isOffline: true
                });
            }
            updateDisplay();
        }

        function updateDisplay() {
            filteredSongs = [...allSongs];
            document.getElementById('loader').style.display = 'none';
            renderPlaylist(filteredSongs);
        }

        function renderPlaylist(songsToDisplay) {
            const playlistElement = document.getElementById('playlist');
            playlistElement.innerHTML = "";
            songsToDisplay.forEach((song, index) => {
                const li = document.createElement('li');
                li.className = "song-item";
                li.id = "song-" + index;
                
                const offlineTag = song.isOffline ? `<span class="tag-offline">OFFLINE</span>` : "";
                const downloadBtn = song.isOffline ? "" : `<a href="${song.url}" download="${song.name}.mp3" class="dl-btn">⬇ DL</a>`;

                li.innerHTML = `
                    <div class="song-info" onclick="playSong(${index})">
                        ${offlineTag}${song.name}
                    </div>
                    <div class="action-btns">
                        ${downloadBtn}
                        <button class="dl-btn" onclick="shareSong('${song.name}')">🔗</button>
                    </div>
                `;
                playlistElement.appendChild(li);
            });
        }

        function filterSongs() {
            const term = document.getElementById('search-input').value.toLowerCase();
            filteredSongs = allSongs.filter(s => s.name.toLowerCase().includes(term));
            renderPlaylist(filteredSongs);
        }

        function playSong(index) {
            if (index < 0 || index >= filteredSongs.length) return;
            currentIndex = index;
            audioPlayer.src = filteredSongs[index].url;
            audioPlayer.play();
            currentSongTitle.innerText = filteredSongs[index].name;
            
            document.querySelectorAll('.song-item').forEach(el => el.classList.remove('active'));
            const activeItem = document.getElementById("song-"+index);
            if(activeItem) activeItem.classList.add('active');
        }

        function nextSong() {
            let next;
            if (isShuffle) {
                next = Math.floor(Math.random() * filteredSongs.length);
            } else {
                next = (currentIndex + 1 >= filteredSongs.length) ? 0 : currentIndex + 1;
            }
            playSong(next);
        }

        function prevSong() {
            let prev = (currentIndex - 1 < 0) ? filteredSongs.length - 1 : currentIndex - 1;
            playSong(prev);
        }

        function toggleShuffle() {
            isShuffle = !isShuffle;
            const btn = document.getElementById('shuffle-btn');
            btn.innerText = isShuffle ? "🔀 Shuffle On" : "🔀 Shuffle Off";
            btn.classList.toggle('active-mode', isShuffle);
        }

        function toggleRepeat() {
            const btn = document.getElementById('repeat-btn');
            if (repeatMode === 'off') { repeatMode = 'all'; btn.innerText = "🔁 Repeat All"; btn.classList.add('active-mode'); }
            else if (repeatMode === 'all') { repeatMode = 'one'; btn.innerText = "🔂 Repeat One"; }
            else { repeatMode = 'off'; btn.innerText = "🔁 Repeat Off"; btn.classList.remove('active-mode'); }
        }

        audioPlayer.onended = () => {
            if (repeatMode === 'one') audioPlayer.play();
            else nextSong();
        };

        function shareSong(name) {
            if (navigator.share) {
                navigator.share({ title: 'Music', text: 'နားဆင်ကြည့်ပါ: ' + name, url: window.location.href });
            } else {
                alert("Link copied!");
            }
        }

        fetchSongs();
    </script>
</body>
</html>
