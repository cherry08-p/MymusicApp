<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaintcherryMB Ultimate Player</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Pyidaungsu&family=Noto+Sans+Myanmar:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-blue: #3498db;
            --success-green: #2ecc71;
            --heart-red: #e74c3c;
            --bg-black: #121212;
            --card-bg: #1e1e1e;
            --text-white: #ffffff;
            --text-gray: #b3b3b3;
        }

        body { 
            font-family: 'Pyidaungsu', sans-serif; 
            background-color: var(--bg-black);
            color: var(--text-white);
            margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Marquee Header */
        .marquee-container {
            width: 100%; max-width: 500px; overflow: hidden; white-space: nowrap;
            background: rgba(255,255,255,0.05); border-radius: 50px;
            margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1);
        }
        .marquee-text {
            display: inline-block; padding-left: 100%; 
            animation: marquee 25s linear infinite;
            color: var(--success-green); font-size: 1rem; padding: 10px 0;
        }
        @keyframes marquee { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }

        /* Main Song Card */
        .song-card {
            background-color: var(--card-bg);
            width: 90%; max-width: 380px;
            padding: 25px; border-radius: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            margin-bottom: 15px; position: relative;
            text-align: center;
        }
        .tag-status { color: var(--primary-blue); font-weight: bold; font-size: 0.9rem; margin-bottom: 10px; display: block; text-align: left; }
        .song-name-display { font-size: 1.5rem; font-weight: bold; margin-bottom: 20px; min-height: 50px; line-height: 1.3; }

        /* Media Controls */
        .media-controls { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 15px; }
        .control-btn { background: none; border: none; color: white; font-size: 1.8rem; cursor: pointer; transition: 0.2s; }
        .control-btn:active { transform: scale(0.9); }
        .play-pause-btn { background: var(--primary-blue); width: 60px; height: 60px; border-radius: 50%; font-size: 1.5rem; display: flex; align-items: center; justify-content: center; }

        /* Secondary Controls (Shuffle, Repeat, Fav) */
        .extra-btns { display: flex; justify-content: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        .sub-btn { background: #333; border: none; color: white; padding: 8px 12px; border-radius: 10px; cursor: pointer; font-size: 0.8rem; }
        .sub-btn.active { background: var(--primary-blue); }

        audio { width: 100%; max-width: 400px; filter: invert(100%); margin-bottom: 15px; }

        /* Playlist UI */
        .search-box { width: 90%; max-width: 400px; background: #2a2a2a; border: none; padding: 12px; border-radius: 10px; color: white; margin-bottom: 15px; }
        #playlist { width: 100%; max-width: 400px; list-style: none; padding: 0; }
        .song-item {
            background: #252525; margin-bottom: 8px; padding: 12px 15px;
            border-radius: 15px; display: flex; justify-content: space-between; align-items: center;
        }
        .song-item.active { border-left: 4px solid var(--primary-blue); background: #2d2d2d; }
        .song-info { flex: 1; cursor: pointer; font-size: 0.95rem; }
        .item-actions { display: flex; gap: 15px; align-items: center; }
        .dl-icon { color: var(--success-green); text-decoration: none; font-size: 1.1rem; }
        .fav-icon { cursor: pointer; font-size: 1.2rem; color: #444; }
        .fav-icon.active { color: var(--heart-red); }

        .upload-container { margin-bottom: 15px; }
        .file-label { background: var(--success-green); padding: 10px 15px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 0.9rem; }
        #file-upload { display: none; }
    </style>
</head>
<body>

    <div class="marquee-container">
        <div class="marquee-text">🎵 အိမ့်ချယ်ရီမိုဘိုင်းလ် - ကုန်သည်လမ်း၊ လပွတ္တာမြို့။ ဖုန်း-09790199067/09262450004-အားပေးမှုကိုကျေးဇူးတင်ပါတယ်။ 🎵</div>
    </div>

    <div class="upload-container">
        <label for="file-upload" class="file-label">📂 ဖုန်းထဲက သီချင်း‌ရွေးရန်</label>
        <input type="file" id="file-upload" accept="audio/*" multiple onchange="handleOfflineFiles(event)">
    </div>

    <div class="song-card">
        <span id="status-tag" class="tag-status">#waiting</span>
        <div id="display-title" class="song-name-display">သီချင်းရွေးချယ်ပါ</div>
        
        <div class="media-controls">
            <button class="control-btn" onclick="prevSong()">⏮</button>
            <button id="play-pause-btn" class="control-btn play-pause-btn" onclick="toggleAudio()">▶</button>
            <button class="control-btn" onclick="nextSong()">⏭</button>
        </div>

        <div class="extra-btns">
            <button id="shuffle-btn" class="sub-btn" onclick="toggleShuffle()">🔀 Shuffle</button>
            <button id="repeat-btn" class="sub-btn" onclick="toggleRepeat()">🔁 Repeat: Off</button>
            <button id="main-fav-btn" class="sub-btn" onclick="toggleFavoriteCurrent()">❤ Favorite</button>
        </div>
    </div>

    <audio id="audio-player" controls onended="handleEnded()"></audio>

    <input type="text" class="search-box" id="search-input" placeholder="သီချင်းရှာရန်..." onkeyup="filterSongs()">
    
    <div style="margin-bottom:10px;">
        <button class="sub-btn" onclick="renderPlaylist(allSongs)">အားလုံး</button>
        <button class="sub-btn" onclick="showFavoritesOnly()">အသည်းပေးထားသည်များ ⭐</button>
    </div>

    <ul id="playlist"></ul>

    <script>
        const sources = [
            { user: "EaintcherryMB", repo: "music-gitapp" },
            { user: "EaintcherryMB", repo: "Songs" },
            { user: "cherry08-p", repo: "MymusicApp" },
            { user: "cherry08-p", repo: "ecy1" }
        ];

        let allSongs = [];
        let currentIndex = -1;
        let isShuffle = false;
        let repeatMode = 'off'; // off, all, one
        let favorites = JSON.parse(localStorage.getItem('favSongs')) || [];

        const audioPlayer = document.getElementById('audio-player');
        const displayTitle = document.getElementById('display-title');
        const playPauseBtn = document.getElementById('play-pause-btn');

        async function fetchOnlineSongs() {
            for (const src of sources) {
                try {
                    const response = await fetch(`https://api.github.com/repos/${src.user}/${src.repo}/contents/`);
                    const data = await response.json();
                    if (Array.isArray(data)) {
                        const filtered = data.filter(f => f.name.toLowerCase().endsWith('.mp3'))
                            .map(f => ({ name: f.name.replace('.mp3', '').replace(/[-_]/g, ' '), url: f.download_url, type: 'online' }));
                        allSongs = [...allSongs, ...filtered];
                    }
                } catch (e) { console.error("Error fetching online songs"); }
            }
            renderPlaylist(allSongs);
        }

        function handleOfflineFiles(event) {
            const files = event.target.files;
            for (let file of files) {
                const objectURL = URL.createObjectURL(file);
                allSongs.unshift({ name: file.name.replace('.mp3', '').replace(/[-_]/g, ' '), url: objectURL, type: 'local' });
            }
            renderPlaylist(allSongs);
            playSong(0);
        }

        function renderPlaylist(songsToDisplay) {
            const playlist = document.getElementById('playlist');
            playlist.innerHTML = "";
            songsToDisplay.forEach((song) => {
                const originalIndex = allSongs.findIndex(s => s.name === song.name);
                const isFav = favorites.includes(song.name);
                const li = document.createElement('li');
                li.className = `song-item ${originalIndex === currentIndex ? 'active' : ''}`;
                li.innerHTML = `
                    <div class="song-info" onclick="playSong(${originalIndex})">
                        <span style="font-size:0.7rem; color:var(--primary-blue);">#${song.type}</span><br>
                        ${song.name}
                    </div>
                    <div class="item-actions">
                        ${song.type === 'online' ? `<a href="${song.url}" download="${song.name}.mp3" class="dl-icon">⬇</a>` : ''}
                        <span class="fav-icon ${isFav ? 'active' : ''}" onclick="toggleFavorite('${song.name}')">❤</span>
                    </div>
                `;
                playlist.appendChild(li);
            });
        }

        function playSong(index) {
            if (index < 0 || index >= allSongs.length) return;
            currentIndex = index;
            const song = allSongs[index];
            audioPlayer.src = song.url;
            displayTitle.innerText = song.name;
            document.getElementById('status-tag').innerText = '#' + song.type;
            
            playPauseBtn.innerText = "⏸";
            updateFavUI(song.name);
            renderPlaylist(allSongs);
            audioPlayer.play();
        }

        function toggleAudio() {
            if (audioPlayer.paused) {
                audioPlayer.play();
                playPauseBtn.innerText = "⏸";
            } else {
                audioPlayer.pause();
                playPauseBtn.innerText = "▶";
            }
        }

        function nextSong() {
            let next;
            if (isShuffle) {
                next = Math.floor(Math.random() * allSongs.length);
            } else {
                next = (currentIndex + 1 >= allSongs.length) ? 0 : currentIndex + 1;
            }
            playSong(next);
        }

        function prevSong() {
            let prev = (currentIndex - 1 < 0) ? allSongs.length - 1 : currentIndex - 1;
            playSong(prev);
        }

        function toggleShuffle() {
            isShuffle = !isShuffle;
            document.getElementById('shuffle-btn').classList.toggle('active', isShuffle);
        }

        function toggleRepeat() {
            const btn = document.getElementById('repeat-btn');
            if (repeatMode === 'off') {
                repeatMode = 'all';
                btn.innerText = "🔁 Repeat: All";
                btn.classList.add('active');
            } else if (repeatMode === 'all') {
                repeatMode = 'one';
                btn.innerText = "🔂 Repeat: One";
            } else {
                repeatMode = 'off';
                btn.innerText = "🔁 Repeat: Off";
                btn.classList.remove('active');
            }
        }

        function handleEnded() {
            if (repeatMode === 'one') {
                audioPlayer.play();
            } else if (repeatMode === 'all' || currentIndex < allSongs.length - 1) {
                nextSong();
            } else {
                playPauseBtn.innerText = "▶";
            }
        }

        function toggleFavorite(songName) {
            favorites.includes(songName) ? favorites = favorites.filter(n => n !== songName) : favorites.push(songName);
            localStorage.setItem('favSongs', JSON.stringify(favorites));
            renderPlaylist(allSongs);
            updateFavUI(allSongs[currentIndex]?.name);
        }

        function toggleFavoriteCurrent() {
            if (currentIndex !== -1) toggleFavorite(allSongs[currentIndex].name);
        }

        function updateFavUI(name) {
            document.getElementById('main-fav-btn').classList.toggle('active', favorites.includes(name));
        }

        function showFavoritesOnly() {
            const favList = allSongs.filter(s => favorites.includes(s.name));
            renderPlaylist(favList);
        }

        function filterSongs() {
            const term = document.getElementById('search-input').value.toLowerCase();
            const filtered = allSongs.filter(s => s.name.toLowerCase().includes(term));
            renderPlaylist(filtered);
        }

        fetchOnlineSongs();
    </script>
</body>
</html>
